<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Poker Shot Clock</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { background: #0a0a0f; color: #fff; font-family: 'Segoe UI', sans-serif; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0f 70%); z-index: -1; }

  .warning-banner {
    position: fixed; top: 0; left: 0; right: 0;
    background: #92400e; border-bottom: 2px solid #f59e0b; color: #fcd34d;
    text-align: center; font-size: 0.65rem; letter-spacing: 0.3em; text-transform: uppercase;
    padding: 6px; transform: translateY(-100%); transition: transform 0.3s; z-index: 100;
  }
  .warning-banner.visible { transform: translateY(0); }

  .menu-btn {
    position: fixed; top: 10px; left: 10px; z-index: 200;
    background: rgba(20,20,32,0.95); border: 1px solid #333; color: #aaa;
    width: 40px; height: 40px; border-radius: 8px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
    touch-action: manipulation;
  }
  .menu-btn span { display: block; width: 17px; height: 2px; background: currentColor; border-radius: 2px; transition: all 0.25s; }
  .menu-btn.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .menu-btn.open span:nth-child(2) { opacity: 0; }
  .menu-btn.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); opacity: 0; pointer-events: none; transition: opacity 0.25s; z-index: 150; }
  .drawer-overlay.open { opacity: 1; pointer-events: all; }
  .drawer {
    position: fixed; top: 0; left: 0; bottom: 0; width: 270px;
    background: #13131f; border-right: 1px solid #2a2a3e; padding: 68px 22px 28px;
    transform: translateX(-100%); transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
    z-index: 160; display: flex; flex-direction: column; gap: 26px; overflow-y: auto;
  }
  .drawer.open { transform: translateX(0); }
  .drawer-title { font-size: 0.6rem; letter-spacing: 0.35em; color: #444; text-transform: uppercase; }
  .drawer-section { display: flex; flex-direction: column; gap: 14px; }
  .drawer-section-title { font-size: 0.55rem; letter-spacing: 0.3em; color: #444; text-transform: uppercase; border-bottom: 1px solid #1e1e2e; padding-bottom: 5px; }
  .drawer-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .drawer-label { font-size: 0.78rem; color: #888; }
  .spinner { display: flex; align-items: center; border: 1px solid #333; border-radius: 6px; overflow: hidden; transition: opacity 0.2s; }
  .spinner.locked { opacity: 0.3; pointer-events: none; }
  .spinner-btn { background: #1e1e2e; border: none; color: #aaa; width: 38px; height: 42px; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; user-select: none; touch-action: manipulation; }
  .spinner-btn:active { background: #3b82f6; color: #fff; }
  .spinner-val { background: #0d0d18; color: #fff; width: 50px; height: 42px; text-align: center; line-height: 42px; font-size: 0.95rem; font-weight: 600; font-variant-numeric: tabular-nums; border-left: 1px solid #333; border-right: 1px solid #333; }
  .settings-lock-msg { font-size: 0.6rem; color: #ef4444; opacity: 0; transition: opacity 0.3s; text-align: center; }
  .settings-lock-msg.visible { opacity: 1; }

  .sound-toggle {
    position: fixed; top: 10px; right: 10px; z-index: 200;
    background: rgba(20,20,32,0.95); border: 1px solid #333; color: #888;
    padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 0.68rem; letter-spacing: 0.08em;
    touch-action: manipulation;
  }
  .sound-toggle.on { color: #3b82f6; border-color: #3b82f6; }

  /* ── Layout: fixed grid ── */
  .layout {
    position: fixed; inset: 0;
    display: grid;
    grid-template-columns: 45% 55%;
  }

  .col-clock {
    display: flex; align-items: center; justify-content: center;
    /* padding: hamburger(left) + margin */
    padding: 10px 8px 10px 58px;
  }

  /* clock-wrap size is set by JS */
  .clock-wrap { position: relative; flex-shrink: 0; }

  .clock-svg { position: absolute; inset: 0; width: 100%; height: 100%; transform: rotate(-90deg); }
  .track { fill: none; stroke: #1e1e2e; }
  .progress { fill: none; stroke-linecap: round; transition: stroke-dashoffset 1s linear, stroke 0.4s; }
  .clock-inner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  /* font sizes set by JS */
  .time-display { font-weight: 700; line-height: 1; font-variant-numeric: tabular-nums; transition: color 0.3s; white-space: nowrap; }
  .time-label { color: #555; text-transform: uppercase; white-space: nowrap; }

  @keyframes warn-ring { 0%{transform:scale(1);opacity:0.7} 100%{transform:scale(1.12);opacity:0} }
  @keyframes pulse-ring { 0%{transform:scale(1);opacity:0.5} 100%{transform:scale(1.1);opacity:0} }
  .warn-ring { position: absolute; border-radius: 50%; border: 3px solid #f59e0b; animation: warn-ring 1s ease-out infinite; display: none; }
  .pulse-ring { position: absolute; border-radius: 50%; border: 2px solid #ef4444; animation: pulse-ring 0.8s ease-out infinite; display: none; }
  .state-warning .warn-ring { display: block; }
  .state-danger .pulse-ring, .state-expired .pulse-ring { display: block; }

  .col-info {
    display: flex; flex-direction: column; justify-content: center;
    padding: 10px 58px 10px 12px;
    gap: 10px;
  }

  .bank-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px; background: rgba(255,255,255,0.03);
    border-radius: 10px; border: 1px solid #1e1e2e; flex-shrink: 0;
  }
  .bank-icon { font-size: 1rem; }
  .bank-label { font-size: 0.55rem; letter-spacing: 0.18em; color: #555; text-transform: uppercase; }
  .bank-count { font-size: 1.4rem; font-weight: 700; font-variant-numeric: tabular-nums; color: #888; margin-left: auto; }
  .bank-count.has-used { color: #ef4444; }
  @keyframes bank-flash { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .bank-badge { font-size: 0.5rem; letter-spacing: 0.15em; color: #f59e0b; display: none; }
  .bank-active .bank-badge { display: block; animation: bank-flash 0.7s infinite; }

  .controls { display: flex; flex-direction: column; gap: 8px; flex: 1; min-height: 0; }

  .btn {
    flex: 1; width: 100%; border: none; border-radius: 14px; cursor: pointer;
    font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    touch-action: manipulation; transition: filter 0.1s, transform 0.1s;
    min-height: 44px;
    /* font-size set by JS */
  }
  .btn:active { filter: brightness(0.85); transform: scale(0.97); }
  .btn-start { background: #3b82f6; color: #fff; flex: 1.6; }
  .btn-start:disabled { opacity: 0.35; }
  .btn-restart { background: #16a34a; color: #fff; border: 1px solid #22c55e; }
  .btn-reset { background: #1a1a28; color: #666; border: 1px solid #252535; flex: 0.7; }

  /* State colors */
  .state-idle .progress, .state-running .progress { stroke: #3b82f6; }
  .state-warning .progress { stroke: #f59e0b; }
  .state-danger .progress, .state-expired .progress { stroke: #ef4444; }
  .state-bank-added .progress { stroke: #f59e0b; }
  .state-warning .time-display { color: #f59e0b; }
  .state-danger .time-display, .state-expired .time-display { color: #ef4444; }
  .state-bank-added .time-display { color: #f59e0b; }
  @keyframes flash { 0%,100%{opacity:1} 50%{opacity:0.1} }
  .state-expired .time-display { animation: flash 0.6s infinite; }

  /* Portrait */
  @media (orientation: portrait) {
    .layout { grid-template-columns: 100%; grid-template-rows: auto 1fr; }
    .col-clock { padding: 58px 16px 8px; }
    .col-info { padding: 8px 16px 16px; }
  }
</style>
</head>
<body>

<div class="warning-banner" id="warningBanner">&#9888; 残り10秒</div>
<button class="menu-btn" id="menuBtn" onclick="toggleMenu()"><span></span><span></span><span></span></button>
<div class="drawer-overlay" id="drawerOverlay" onclick="closeMenu()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-title">設定</div>
  <div class="drawer-section">
    <div class="drawer-section-title">タイマー</div>
    <div class="drawer-row">
      <span class="drawer-label">Shot Clock（秒）</span>
      <div class="spinner" id="shotSpinner">
        <button class="spinner-btn" onclick="changeShot(-5)">&#8722;</button>
        <div class="spinner-val" id="shotVal">30</div>
        <button class="spinner-btn" onclick="changeShot(5)">+</button>
      </div>
    </div>
    <div class="drawer-row">
      <span class="drawer-label">Time Bank（秒/1回）</span>
      <div class="spinner" id="bankSpinner">
        <button class="spinner-btn" onclick="changeBank(-5)">&#8722;</button>
        <div class="spinner-val" id="bankVal">30</div>
        <button class="spinner-btn" onclick="changeBank(5)">+</button>
      </div>
    </div>
    <div class="settings-lock-msg" id="lockMsg">&#9888; クロック動作中は変更できません</div>
  </div>
  <div class="drawer-section">
    <div class="drawer-section-title">キーボード</div>
    <div style="font-size:0.72rem;color:#555;line-height:2.2;">
      <b style="color:#666">SPACE</b> &#8212; スタート / ポーズ<br>
      <b style="color:#666">N</b> &#8212; リセット &amp; スタート<br>
      <b style="color:#666">R</b> &#8212; リセット
    </div>
  </div>
</div>
<button class="sound-toggle on" id="soundToggle" onclick="toggleSound()">&#128266; SOUND</button>

<div class="layout">
  <div class="col-clock" id="colClock">
    <div class="clock-wrap" id="clockWrap">
      <div class="clock-container state-idle" id="clockContainer" style="position:absolute;inset:0;">
        <div class="warn-ring" id="warnRing"></div>
        <div class="pulse-ring" id="pulseRing"></div>
        <svg class="clock-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <circle class="track" id="trackCircle" cx="50" cy="50" r="45"/>
          <circle class="progress" id="progressRing" cx="50" cy="50" r="45"/>
        </svg>
        <div class="clock-inner">
          <div class="time-display" id="timeDisplay">30</div>
          <div class="time-label" id="timeLabel">SECONDS</div>
        </div>
      </div>
    </div>
  </div>

  <div class="col-info">
    <div class="bank-row" id="bankRow">
      <span class="bank-icon">&#9889;</span>
      <div>
        <div class="bank-label">Time Bank 使用回数</div>
        <div class="bank-badge">+ TIME BANK</div>
      </div>
      <div class="bank-count" id="bankUsedCount">0</div>
    </div>
    <div class="controls">
      <button class="btn btn-start" id="startBtn" onclick="toggleClock()">START</button>
      <button class="btn btn-restart" onclick="restartClock()">&#8635; RESET &amp; START</button>
      <button class="btn btn-reset" onclick="resetClock()">RESET</button>
    </div>
  </div>
</div>

<script>
/* ── Resize: compute clock size and font sizes from actual pixel dimensions ── */
var CIRC = 2 * Math.PI * 45; /* SVG viewBox r=45 */
var ring = document.getElementById('progressRing');
ring.style.strokeDasharray = CIRC;
ring.style.strokeDashoffset = 0;

function resize() {
  var col = document.getElementById('colClock');
  var wrap = document.getElementById('clockWrap');
  var cr = col.getBoundingClientRect();

  /* Available area inside the column */
  var aw = cr.width;
  var ah = cr.height;
  /* Clock diameter = fit inside available box */
  var size = Math.floor(Math.min(aw, ah));
  size = Math.max(size, 80);

  wrap.style.width  = size + 'px';
  wrap.style.height = size + 'px';

  /* Stroke width proportional to clock size (5% of diameter) */
  var sw = Math.max(3, size * 0.05);
  document.getElementById('trackCircle').style.strokeWidth = sw + 'px'; /* px in viewBox units: scale by 100/size */
  /* SVG viewBox is 100x100, stroke-width in SVG units = sw * 100/size */
  var svgSw = sw * 100 / size;
  document.getElementById('trackCircle').setAttribute('stroke-width', svgSw);
  document.getElementById('progressRing').setAttribute('stroke-width', svgSw);

  /* Ring overlays */
  var pad = sw * 0.5;
  document.getElementById('warnRing').style.cssText  = 'inset:-' + (pad+2) + 'px; border-width:' + Math.max(2, sw*0.3) + 'px;';
  document.getElementById('pulseRing').style.cssText = 'inset:-' + (pad+5) + 'px; border-width:' + Math.max(1.5, sw*0.22) + 'px;';

  /* Font sizes: proportional to clock diameter */
  document.getElementById('timeDisplay').style.fontSize = Math.round(size * 0.30) + 'px';
  var lblSize = Math.round(size * 0.052);
  var lblEl = document.getElementById('timeLabel');
  lblEl.style.fontSize    = lblSize + 'px';
  lblEl.style.marginTop   = Math.round(size * 0.03) + 'px';
  /* letter-spacing trick: add text-indent = letter-spacing to center properly */
  var ls = Math.round(lblSize * 0.35);
  lblEl.style.letterSpacing = ls + 'px';
  lblEl.style.textIndent    = ls + 'px';

  /* Button font sizes proportional to available right-column height */
  var btnH = document.getElementById('startBtn').getBoundingClientRect().height;
  var btnFs = Math.max(12, Math.min(Math.round(btnH * 0.35), 28));
  document.getElementById('startBtn').style.fontSize    = btnFs + 'px';
  document.getElementById('startBtn').style.borderRadius = Math.round(btnH * 0.22) + 'px';
  var btnFs2 = Math.max(11, Math.min(Math.round(btnH * 0.28), 22));
  var rb = document.querySelector('.btn-restart');
  rb.style.fontSize    = btnFs2 + 'px';
  rb.style.borderRadius = Math.round(btnH * 0.22) + 'px';
  var resetB = document.querySelector('.btn-reset');
  resetB.style.fontSize    = Math.max(10, Math.round(btnFs2 * 0.82)) + 'px';
  resetB.style.borderRadius = Math.round(btnH * 0.22) + 'px';
}

window.addEventListener('resize', function(){ resize(); });
window.addEventListener('orientationchange', function(){ setTimeout(resize, 250); });

/* ── Audio ── */
var audioCtx=null,soundEnabled=true;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function beep(f,d,v,t){if(!soundEnabled)return;f=f||440;d=d||0.1;v=v||0.3;t=t||'sine';try{var c=getAudio(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;o.type=t;g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.start(c.currentTime);o.stop(c.currentTime+d);}catch(e){}}
function toggleSound(){soundEnabled=!soundEnabled;var b=document.getElementById('soundToggle');b.innerHTML=soundEnabled?'&#128266; SOUND':'&#128263; MUTED';b.className='sound-toggle'+(soundEnabled?' on':'');}

/* ── Menu ── */
var menuOpen=false;
function toggleMenu(){menuOpen=!menuOpen;['menuBtn','drawer','drawerOverlay'].forEach(function(id){document.getElementById(id).classList.toggle('open',menuOpen);});}
function closeMenu(){menuOpen=false;['menuBtn','drawer','drawerOverlay'].forEach(function(id){document.getElementById(id).classList.remove('open');});}

/* ── State ── */
var shotTime=30,bankTime=30,currentTime=30;
var isRunning=false,bankUsedCount=0,justUsedBank=false;
var interval=null,lockMsgTimer=null,bankBadgeTimer=null;

function showLockWarning(){var m=document.getElementById('lockMsg');m.classList.add('visible');clearTimeout(lockMsgTimer);lockMsgTimer=setTimeout(function(){m.classList.remove('visible');},2200);}
function changeShot(d){if(isRunning){showLockWarning();return;}shotTime=Math.max(5,Math.min(300,shotTime+d));currentTime=shotTime;bankUsedCount=0;document.getElementById('shotVal').textContent=shotTime;updateDisplay();}
function changeBank(d){if(isRunning){showLockWarning();return;}bankTime=Math.max(0,Math.min(300,bankTime+d));document.getElementById('bankVal').textContent=bankTime;}
function setSpinnersLocked(l){document.getElementById('shotSpinner').classList.toggle('locked',l);document.getElementById('bankSpinner').classList.toggle('locked',l);}
function setWarningBanner(v){document.getElementById('warningBanner').classList.toggle('visible',v);}

function updateDisplay(){
  var tEl=document.getElementById('timeDisplay');
  var bC=document.getElementById('bankUsedCount');
  var con=document.getElementById('clockContainer');
  var bankRow=document.getElementById('bankRow');
  var sB=document.getElementById('startBtn');

  tEl.textContent=Math.max(0,Math.ceil(currentTime));
  bC.textContent=bankUsedCount;
  bC.className='bank-count'+(bankUsedCount>0?' has-used':'');
  bankRow.className='bank-row'+(justUsedBank?' bank-active':'');

  var maxTime=bankUsedCount>0?bankTime:shotTime;
  ring.style.strokeDashoffset=CIRC*(1-Math.max(0,Math.min(1,currentTime/maxTime)));

  con.className='clock-container';
  var expired=currentTime<=0&&!isRunning;
  if(expired){con.classList.add('state-expired');setWarningBanner(false);}
  else if(justUsedBank){con.classList.add('state-bank-added');setWarningBanner(false);}
  else if(!isRunning){con.classList.add('state-idle');setWarningBanner(false);}
  else if(currentTime<=5){con.classList.add('state-danger');setWarningBanner(true);}
  else if(currentTime<=10){con.classList.add('state-warning');setWarningBanner(true);}
  else{con.classList.add('state-running');setWarningBanner(false);}

  sB.disabled=expired;
  sB.textContent=isRunning?'PAUSE':(expired?'EXPIRED':'START');
  setSpinnersLocked(isRunning);
}

function tick(){
  currentTime-=1;
  if(currentTime===10)beep(660,0.2,0.45);
  else if(currentTime<10&&currentTime>0)beep(880,0.08,0.25);
  if(currentTime<=0){
    currentTime=0;
    if(bankTime>0){
      currentTime=bankTime;bankUsedCount++;justUsedBank=true;
      clearTimeout(bankBadgeTimer);
      bankBadgeTimer=setTimeout(function(){justUsedBank=false;updateDisplay();},1200);
      beep(550,0.12,0.3);setTimeout(function(){beep(660,0.12,0.3);},150);setTimeout(function(){beep(770,0.15,0.35);},300);
      ring.style.transition='none';ring.style.strokeDashoffset=0;
      setTimeout(function(){ring.style.transition='stroke-dashoffset 1s linear, stroke 0.4s';},50);
      updateDisplay();return;
    }else{
      clearInterval(interval);isRunning=false;
      setTimeout(function(){beep(660,0.15,0.4);},0);setTimeout(function(){beep(660,0.15,0.4);},200);setTimeout(function(){beep(440,0.4,0.5,'sawtooth');},400);
      updateDisplay();return;
    }
  }
  updateDisplay();
}

function toggleClock(){
  if(currentTime<=0&&!isRunning)return;
  if(isRunning){clearInterval(interval);isRunning=false;beep(330,0.1,0.2);}
  else{isRunning=true;beep(550,0.1,0.2);interval=setInterval(tick,1000);}
  updateDisplay();
}
function resetClock(){
  clearInterval(interval);clearTimeout(bankBadgeTimer);
  isRunning=false;justUsedBank=false;currentTime=shotTime;bankUsedCount=0;
  setWarningBanner(false);beep(440,0.08,0.15);
  ring.style.transition='none';ring.style.strokeDashoffset=0;
  setTimeout(function(){ring.style.transition='stroke-dashoffset 1s linear, stroke 0.4s';updateDisplay();},50);
}
function restartClock(){
  clearInterval(interval);clearTimeout(bankBadgeTimer);
  isRunning=false;justUsedBank=false;currentTime=shotTime;bankUsedCount=0;setWarningBanner(false);
  ring.style.transition='none';ring.style.strokeDashoffset=0;
  setTimeout(function(){
    ring.style.transition='stroke-dashoffset 1s linear, stroke 0.4s';
    isRunning=true;interval=setInterval(tick,1000);
    beep(550,0.12,0.25);setTimeout(function(){beep(660,0.12,0.25);},120);
    updateDisplay();
  },50);
}
document.addEventListener('keydown',function(e){
  if(e.code==='Space'){e.preventDefault();toggleClock();}
  if(e.code==='KeyN')restartClock();
  if(e.code==='KeyR')resetClock();
  if(e.code==='Escape')closeMenu();
});

/* Initial render after layout settles */
setTimeout(function(){ resize(); updateDisplay(); }, 100);
</script>
</body>
</html>
